<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포티넷 NSE 자격증 취득 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg:#f7f7f5;--card:#fff;--border:#e8e8e4;--text:#1a1a1a;--muted:#888880;
    --fcss:#1a5fb4;--fcss-bg:#e8f0fc;--fcp:#c27d0e;--fcp-bg:#fef3dc;
    --pass:#1d7a4a;--pass-bg:#e6f4ec;--wait:#9a6000;--wait-bg:#fef5e0;
    --none:#666660;--none-bg:#f0f0ec;--fail:#c0392b;--fail-bg:#fde8e6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2.5rem 1rem}
  .container{max-width:900px;margin:0 auto}
  .header{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1.5px solid var(--border)}
  .header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap}
  .header h1{font-size:22px;font-weight:600;letter-spacing:-0.3px}
  .header .date{font-size:13px;color:var(--muted);margin-top:4px;font-family:'DM Mono',monospace}
  .header-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px}
  .last-updated{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:'Noto Sans KR',sans-serif;transition:background 0.15s}
  .btn:hover{background:#f0f0ec}
  .btn.csv{border-color:#1d7a4a;color:#1d7a4a}.btn.csv:hover{background:#e6f4ec}
  .btn.excel{border-color:#1a5fb4;color:#1a5fb4}.btn.excel:hover{background:#e8f0fc}
  .loading{text-align:center;padding:4rem 1rem;color:var(--muted)}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--fcss);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-box{background:#fde8e6;border:1px solid #f5c6c6;border-radius:10px;padding:1rem 1.25rem;color:#c0392b;font-size:13px;margin-bottom:1rem;display:none}
  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:2rem}
  .summary-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.25rem 1.5rem;display:flex;align-items:center;gap:1rem}
  .summary-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .summary-icon.fcss{background:var(--fcss-bg)}.summary-icon.fcp{background:var(--fcp-bg)}
  .summary-info{flex:1}
  .summary-label{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:4px}
  .summary-value{font-size:20px;font-weight:600;font-family:'DM Mono',monospace}
  .summary-goal{font-size:13px;color:var(--muted)}
  .progress-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
  .progress-fill{height:100%;border-radius:2px}
  .progress-fill.fcss{background:var(--fcss)}.progress-fill.fcp{background:var(--fcp)}
  .section{margin-bottom:2rem}
  .section-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .section-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .section-dot.fcss{background:var(--fcss)}.section-dot.fcp{background:var(--fcp)}.section-dot.gray{background:#888780}
  .section-title{font-size:15px;font-weight:600}
  .section-badge{font-size:12px;padding:2px 10px;border-radius:100px;font-family:'DM Mono',monospace;font-weight:500}
  .section-badge.fcss{background:var(--fcss-bg);color:var(--fcss)}.section-badge.fcp{background:var(--fcp-bg);color:var(--fcp)}
  .table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead tr{background:var(--bg);border-bottom:1px solid var(--border)}
  th{padding:10px 16px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;text-align:left;white-space:nowrap}
  th.c{text-align:center}
  td{padding:11px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
  td.c{text-align:center}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafaf8}
  .name-cell{font-weight:500;font-size:14px}
  .div-col{border-left:1px solid var(--border)}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 10px;border-radius:100px;font-weight:500;white-space:nowrap}
  .b-pass{background:var(--pass-bg);color:var(--pass)}
  .b-wait{background:var(--wait-bg);color:var(--wait)}
  .b-none{background:var(--none-bg);color:var(--none)}
  .b-fail{background:var(--fail-bg);color:var(--fail)}
  .acq-y{font-size:16px}.acq-n{font-size:16px;color:#ddd}
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem}
  .stat-label{font-size:12px;color:var(--muted);margin-bottom:4px}
  .stat-value{font-size:22px;font-weight:600;font-family:'DM Mono',monospace}
  .footer{text-align:center;font-size:12px;color:var(--muted);margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border);font-family:'DM Mono',monospace}
  .hidden{display:none}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-top">
      <div>
        <h1>포티넷 NSE 자격증 취득 현황</h1>
        <div class="date" id="report-date">불러오는 중...</div>
      </div>
      <div class="header-right">
        <div class="last-updated" id="last-updated"></div>
        <div class="btn-row">
          <button class="btn" onclick="loadData()">↻ 새로고침</button>
          <button class="btn csv" onclick="downloadCSV()">⬇ CSV</button>
          <button class="btn excel" onclick="downloadExcel()">⬇ 엑셀</button>
        </div>
      </div>
    </div>
  </div>

  <div id="loading" class="loading"><div class="spinner"></div><div>데이터 불러오는 중...</div></div>
  <div id="error" class="error-box"></div>

  <div id="content" class="hidden">
    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-icon fcss">🔵</div>
        <div class="summary-info">
          <div class="summary-label">FCSS 취득 현황</div>
          <div class="summary-value"><span id="fcss-done">0</span><span class="summary-goal"> / 3명</span></div>
          <div class="progress-bar"><div class="progress-fill fcss" id="fcss-bar" style="width:0%"></div></div>
        </div>
      </div>
      <div class="summary-card">
        <div class="summary-icon fcp">🟠</div>
        <div class="summary-info">
          <div class="summary-label">FCP 취득 현황</div>
          <div class="summary-value"><span id="fcp-done">0</span><span class="summary-goal"> / 1명</span></div>
          <div class="progress-bar"><div class="progress-fill fcp" id="fcp-bar" style="width:0%"></div></div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-dot fcss"></div>
        <div class="section-title">FCSS 현황</div>
        <div class="section-badge fcss" id="fcss-badge"></div>
      </div>
      <div class="table-wrap"><table><thead id="fcss-th"></thead><tbody id="fcss-tb"></tbody></table></div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-dot fcp"></div>
        <div class="section-title">FCP 현황</div>
        <div class="section-badge fcp" id="fcp-badge"></div>
      </div>
      <div class="table-wrap"><table><thead id="fcp-th"></thead><tbody id="fcp-tb"></tbody></table></div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-dot gray"></div>
        <div class="section-title">바우처 소모 현황</div>
      </div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">전체 바우처</div><div class="stat-value" id="v-total">—</div></div>
        <div class="stat-card"><div class="stat-label">사용됨</div><div class="stat-value" style="color:#1a5fb4" id="v-used">—</div></div>
        <div class="stat-card"><div class="stat-label">잔여</div><div class="stat-value" style="color:#1d7a4a" id="v-remain">—</div></div>
        <div class="stat-card"><div class="stat-label">불합격</div><div class="stat-value" style="color:#c0392b" id="v-fail">—</div></div>
      </div>
      <div class="table-wrap"><table><thead id="v-th"></thead><tbody id="v-tb"></tbody></table></div>
    </div>
  </div>

  <div class="footer">Fortinet NSE 바우처 관리 시스템</div>
</div>

<script>
const FCSS_GOAL = 3, FCP_GOAL = 1;
let DATA = null;

function badge(task) {
  if (!task || task.used !== '사용') return '<span class="badge b-none">⬜ 미사용</span>';
  if (task.passed === '합격')   return '<span class="badge b-pass">✅ 합격</span>';
  if (task.passed === '불합격') return '<span class="badge b-fail">❌ 불합격</span>';
  return '<span class="badge b-wait">🔄 응시 예정</span>';
}

function statusText(task) {
  if (!task || task.used !== '사용') return '미사용';
  if (task.passed === '합격')   return '합격';
  if (task.passed === '불합격') return '불합격';
  return '응시 예정';
}

function isQualFCSS(tasks) {
  return tasks.some(t => t.exam.includes('Network Security')    && t.passed === '합격') &&
         tasks.some(t => t.exam.includes('Enterprise Firewall') && t.passed === '합격');
}
function isQualFCP(tasks) {
  const used = tasks.filter(t => t.used === '사용');
  return used.length >= 2 && used.every(t => t.passed === '합격');
}

function renderQualTable(thId, tbId, people, isQualFn) {
  const maxT = Math.max(...people.map(p => p.tasks.length), 2);
  let th = '<tr><th>담당자</th>';
  for (let i = 1; i <= maxT; i++)
    th += `<th class="c${i>1?' div-col':''}">시험 ${i} 과목</th><th class="c">결과</th>`;
  th += '<th class="c">자격 취득</th></tr>';
  document.getElementById(thId).innerHTML = th;

  let tb = '';
  people.forEach(p => {
    const qual = isQualFn(p.tasks);
    let row = `<tr><td class="name-cell">${p.name}</td>`;
    for (let i = 0; i < maxT; i++) {
      const t = p.tasks[i];
      const dc = i > 0 ? ' div-col' : '';
      row += `<td class="c${dc}" style="font-size:11px;color:var(--muted)">${t ? t.exam : '—'}</td>`;
      row += `<td class="c">${badge(t)}</td>`;
    }
    row += `<td class="c">${qual ? '<span class="acq-y">🏆</span>' : '<span class="acq-n">—</span>'}</td></tr>`;
    tb += row;
  });
  document.getElementById(tbId).innerHTML = tb;
}

function renderVouchers() {
  document.getElementById('v-total').textContent  = DATA.total_vouchers;
  document.getElementById('v-used').textContent   = DATA.used_vouchers;
  document.getElementById('v-remain').textContent = DATA.remain_vouchers;
  document.getElementById('v-fail').textContent   = DATA.fail_vouchers;

  // 담당자별 사용 바우처 그룹 (all_vouchers)
  const byPerson = {};
  (DATA.all_vouchers || []).forEach(v => {
    const n = v.assignee || '미배정';
    if (!byPerson[n]) byPerson[n] = [];
    byPerson[n].push(v);
  });

  const maxT = Math.max(...Object.values(byPerson).map(t => t.length), 2);

  let th = '<tr><th>담당자</th><th class="c">사용 수</th>';
  for (let i = 1; i <= maxT; i++)
    th += `<th class="c div-col">시험 ${i} 과목</th><th class="c">결과</th>`;
  th += '</tr>';
  document.getElementById('v-th').innerHTML = th;

  let tb = '';
  Object.entries(byPerson).forEach(([name, tasks]) => {
    let row = `<tr><td class="name-cell">${name}</td>`;
    row += `<td class="c" style="font-family:'DM Mono',monospace">${tasks.length}</td>`;
    for (let i = 0; i < maxT; i++) {
      const t = tasks[i];
      row += `<td class="c div-col" style="font-size:11px;color:var(--muted)">${t ? t.exam : '—'}</td>`;
      row += `<td class="c">${t ? badge(t) : '<span style="color:#ddd">—</span>'}</td>`;
    }
    row += '</tr>';
    tb += row;
  });
  document.getElementById('v-tb').innerHTML = tb;
}

function renderAll() {
  const now = new Date(DATA.generated_at);
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('report-date').textContent =
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
  const diffMs = Date.now() - now.getTime();
  const diffMin = Math.floor(diffMs / 60000);
  const diffHour = Math.floor(diffMin / 60);
  let diffStr = diffMin < 1 ? '방금 전'
    : diffMin < 60 ? `${diffMin}분 전`
    : diffHour < 24 ? `${diffHour}시간 전`
    : `${Math.floor(diffHour/24)}일 전`;
  document.getElementById('last-updated').textContent =
    `데이터 기준: ${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()} ${now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})} (${diffStr})`;

  const fcss = DATA.fcss || [];
  const fcp  = DATA.fcp  || [];

  const fcssDone = fcss.filter(p => isQualFCSS(p.tasks)).length;
  document.getElementById('fcss-done').textContent = fcssDone;
  document.getElementById('fcss-badge').textContent = `${fcssDone} / ${FCSS_GOAL}명`;
  document.getElementById('fcss-bar').style.width = `${Math.round(fcssDone/FCSS_GOAL*100)}%`;
  renderQualTable('fcss-th', 'fcss-tb', fcss, isQualFCSS);

  const fcpDone = fcp.filter(p => isQualFCP(p.tasks)).length;
  document.getElementById('fcp-done').textContent = fcpDone;
  document.getElementById('fcp-badge').textContent = `${fcpDone} / ${FCP_GOAL}명`;
  document.getElementById('fcp-bar').style.width = `${Math.round(fcpDone/FCP_GOAL*100)}%`;
  renderQualTable('fcp-th', 'fcp-tb', fcp, isQualFCP);

  renderVouchers();
}

async function loadData() {
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('content').classList.add('hidden');
  document.getElementById('error').style.display = 'none';
  try {
    const res = await fetch('data.json?t=' + Date.now());
    if (!res.ok) throw new Error(`data.json 로드 실패 (${res.status})`);
    DATA = await res.json();
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('content').classList.remove('hidden');
    renderAll();
  } catch(e) {
    document.getElementById('loading').classList.add('hidden');
    const err = document.getElementById('error');
    err.style.display = 'block';
    err.textContent = '데이터 불러오기 실패: ' + e.message;
  }
}

function buildExportRows() {
  if (!DATA) return [];
  const rows = [];
  [...(DATA.fcss||[]), ...(DATA.fcp||[])].forEach(p => {
    const t1=p.tasks[0], t2=p.tasks[1], t3=p.tasks[2];
    const qual = p.tasks.some(t=>t.exam.includes('Network Security')&&t.passed==='합격') &&
                 p.tasks.some(t=>t.exam.includes('Enterprise Firewall')&&t.passed==='합격')
                 || (p.tasks.filter(t=>t.used==='사용').length>=2 && p.tasks.filter(t=>t.used==='사용').every(t=>t.passed==='합격'));
    rows.push({
      '담당자': p.name,
      '시험1 과목명': t1?.exam||'', '시험1 사용여부': t1?.used||'', '시험1 합격여부': t1?statusText(t1):'',
      '시험2 과목명': t2?.exam||'', '시험2 사용여부': t2?.used||'', '시험2 합격여부': t2?statusText(t2):'',
      '시험3 과목명': t3?.exam||'', '시험3 사용여부': t3?.used||'', '시험3 합격여부': t3?statusText(t3):'',
      '자격 취득': qual ? '취득' : '미취득'
    });
  });
  return rows;
}

function downloadCSV() {
  const rows = buildExportRows();
  if (!rows.length) return alert('먼저 데이터를 불러오세요.');
  const headers = Object.keys(rows[0]);
  const csv = [headers.join(','), ...rows.map(r => headers.map(h => `"${(r[h]||'').toString().replace(/"/g,'""')}"`).join(','))].join('\n');
  const date = new Date().toISOString().slice(0,10);
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `포티넷_NSE_현황_${date}.csv`; a.click();
}

function downloadExcel() {
  const rows = buildExportRows();
  if (!rows.length) return alert('먼저 데이터를 불러오세요.');
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:10},{wch:36},{wch:12},{wch:12},{wch:36},{wch:12},{wch:12},{wch:36},{wch:12},{wch:12},{wch:8}];
  XLSX.utils.book_append_sheet(wb, ws, '취득 현황');
  XLSX.writeFile(wb, `포티넷_NSE_현황_${new Date().toISOString().slice(0,10)}.xlsx`);
}

loadData();
</script>
</body>
</html>
