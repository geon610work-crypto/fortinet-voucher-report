<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포티넷 NSE 자격증 취득 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bg:#f7f7f5;--card:#fff;--border:#e8e8e4;--text:#1a1a1a;--muted:#888880;
    --fcss:#1a5fb4;--fcss-bg:#e8f0fc;--fcp:#c27d0e;--fcp-bg:#fef3dc;
    --pass:#1d7a4a;--pass-bg:#e6f4ec;--wait:#9a6000;--wait-bg:#fef5e0;
    --none:#666660;--none-bg:#f0f0ec;--fail:#c0392b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2.5rem 1rem}
  .container{max-width:800px;margin:0 auto}

  .header{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1.5px solid var(--border)}
  .header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap}
  .header h1{font-size:22px;font-weight:600;letter-spacing:-0.3px}
  .header .date{font-size:13px;color:var(--muted);margin-top:4px;font-family:'DM Mono',monospace}
  .header-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px}
  .last-updated{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}

  .export-btns{display:flex;gap:8px}
  .export-btn{
    display:inline-flex;align-items:center;gap:6px;
    padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;
    cursor:pointer;border:1px solid var(--border);
    background:var(--card);color:var(--text);
    font-family:'Noto Sans KR',sans-serif;transition:background 0.15s;
  }
  .export-btn:hover{background:#f0f0ec}
  .export-btn.csv{border-color:#1d7a4a;color:#1d7a4a}
  .export-btn.csv:hover{background:#e6f4ec}
  .export-btn.excel{border-color:#1a5fb4;color:#1a5fb4}
  .export-btn.excel:hover{background:#e8f0fc}

  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:2rem}
  .summary-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.25rem 1.5rem;display:flex;align-items:center;gap:1rem}
  .summary-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .summary-icon.fcss{background:var(--fcss-bg)}
  .summary-icon.fcp{background:var(--fcp-bg)}
  .summary-info{flex:1}
  .summary-label{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:4px}
  .summary-value{font-size:20px;font-weight:600;font-family:'DM Mono',monospace}
  .summary-goal{font-size:13px;color:var(--muted)}
  .progress-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
  .progress-fill{height:100%;border-radius:2px}
  .progress-fill.fcss{background:var(--fcss)}
  .progress-fill.fcp{background:var(--fcp)}

  .section{margin-bottom:2rem}
  .section-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .section-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .section-dot.fcss{background:var(--fcss)}
  .section-dot.fcp{background:var(--fcp)}
  .section-title{font-size:15px;font-weight:600}
  .section-badge{font-size:12px;padding:2px 10px;border-radius:100px;font-family:'DM Mono',monospace;font-weight:500}
  .section-badge.fcss{background:var(--fcss-bg);color:var(--fcss)}
  .section-badge.fcp{background:var(--fcp-bg);color:var(--fcp)}

  .table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead tr{background:var(--bg);border-bottom:1px solid var(--border)}
  th{padding:10px 16px;font-size:11.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;text-align:left}
  th:not(:first-child){text-align:center}
  td{padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
  td:not(:first-child){text-align:center}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafaf8}
  .name-cell{font-weight:500;font-size:14px}

  .badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 10px;border-radius:100px;font-weight:500;white-space:nowrap}
  .badge-pass{background:var(--pass-bg);color:var(--pass)}
  .badge-wait{background:var(--wait-bg);color:var(--wait)}
  .badge-none{background:var(--none-bg);color:var(--none)}
  .badge-fail{background:#fde8e6;color:var(--fail)}
  .acq-done{font-size:16px}
  .acq-no{font-size:16px;color:#ddd}

  .footer{text-align:center;font-size:12px;color:var(--muted);margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border);font-family:'DM Mono',monospace}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-top">
      <div>
        <h1>포티넷 NSE 자격증 취득 현황</h1>
        <div class="date" id="report-date"></div>
      </div>
      <div class="header-right">
        <div class="last-updated" id="last-updated"></div>
        <div class="export-btns">
          <button class="export-btn csv" onclick="downloadCSV()">⬇ CSV 다운로드</button>
          <button class="export-btn excel" onclick="downloadExcel()">⬇ 엑셀 다운로드</button>
        </div>
      </div>
    </div>
  </div>

  <div class="summary-grid">
    <div class="summary-card">
      <div class="summary-icon fcss">🔵</div>
      <div class="summary-info">
        <div class="summary-label">FCSS 취득 현황</div>
        <div class="summary-value"><span id="fcss-done">0</span> <span class="summary-goal">/ 3명</span></div>
        <div class="progress-bar"><div class="progress-fill fcss" id="fcss-bar" style="width:0%"></div></div>
      </div>
    </div>
    <div class="summary-card">
      <div class="summary-icon fcp">🟠</div>
      <div class="summary-info">
        <div class="summary-label">FCP 취득 현황</div>
        <div class="summary-value"><span id="fcp-done">0</span> <span class="summary-goal">/ 1명</span></div>
        <div class="progress-bar"><div class="progress-fill fcp" id="fcp-bar" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-dot fcss"></div>
      <div class="section-title">FCSS 현황</div>
      <div class="section-badge fcss" id="fcss-badge">0 / 3명</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>담당자</th><th>시험 1</th><th>시험 2</th><th>자격 취득</th></tr></thead>
        <tbody id="fcss-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-dot fcp"></div>
      <div class="section-title">FCP 현황</div>
      <div class="section-badge fcp" id="fcp-badge">0 / 1명</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>담당자</th><th>시험 1</th><th>시험 2</th><th>자격 취득</th></tr></thead>
        <tbody id="fcp-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="section" id="voucher-section">
    <div class="section-header">
      <div class="section-dot" style="background:#888780"></div>
      <div class="section-title">바우처 소모 현황</div>
    </div>
    <div class="summary-grid" style="margin-bottom:1rem">
      <div class="summary-card">
        <div class="summary-icon" style="background:#f0f0ec">🎟️</div>
        <div class="summary-info">
          <div class="summary-label">전체 바우처</div>
          <div class="summary-value" id="v-total">—</div>
        </div>
      </div>
      <div class="summary-card">
        <div class="summary-icon" style="background:#e8f0fc">📤</div>
        <div class="summary-info">
          <div class="summary-label">사용됨</div>
          <div class="summary-value" style="color:#1a5fb4" id="v-used">—</div>
        </div>
      </div>
      <div class="summary-card">
        <div class="summary-icon" style="background:#e6f4ec">✅</div>
        <div class="summary-info">
          <div class="summary-label">잔여</div>
          <div class="summary-value" style="color:#1d7a4a" id="v-remain">—</div>
        </div>
      </div>
      <div class="summary-card">
        <div class="summary-icon" style="background:#fde8e6">❌</div>
        <div class="summary-info">
          <div class="summary-label">불합격</div>
          <div class="summary-value" style="color:#c0392b" id="v-fail">—</div>
        </div>
      </div>
    </div>
    <div class="table-wrap">
      <table id="voucher-table">
        <thead id="voucher-thead"></thead>
        <tbody id="voucher-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="footer">Fortinet NSE 바우처 관리 시스템</div>
</div>

<script>
const DATA = {"generated_at": "2026-05-26T21:44:30.182816", "fcss_done": 1, "fcp_done": 1, "total_vouchers": 12, "used_vouchers": 8, "remain_vouchers": 4, "fail_vouchers": 1, "all_vouchers": [{"no": 1, "code": "FTE2544E3106", "assignee": "박건욱", "exam": "FCSS - Network Security 7.6 Support Engineer", "qual": "FCSS", "used": "사용", "passed": "합격"}, {"no": 2, "code": "FTE278896A65", "assignee": "박건욱", "exam": "FCSS - Enterprise Firewall 7.6 Administrator", "qual": "FCSS", "used": "사용", "passed": "미정"}, {"no": 5, "code": "FTE254500125", "assignee": "임희대", "exam": "FCSS - Network Security 7.6 Support Engineer", "qual": "FCSS", "used": "사용", "passed": "합격"}, {"no": 6, "code": "FTE2788C2A5F", "assignee": "임희대", "exam": "FCSS - Enterprise Firewall 7.6 Administrator", "qual": "FCSS", "used": "사용", "passed": "합격"}, {"no": 7, "code": "FTE2788C745B", "assignee": "김태경", "exam": "FCSS - Enterprise Firewall 7.6 Administrator", "qual": "FCSS", "used": "사용", "passed": "불합격"}, {"no": 8, "code": "FTE278914737", "assignee": "김태경", "exam": "FCSS - Network Security 7.6 Support Engineer", "qual": "FCSS", "used": "사용", "passed": "합격"}, {"no": 9, "code": "FTE27896255C", "assignee": "김기현", "exam": "NSE 4 7.6 FortiOS Administrator", "qual": "FCP", "used": "사용", "passed": "합격"}, {"no": 10, "code": "FTE279027E40", "assignee": "김기현", "exam": "NSE 5 7.6 FortiManager Administrator", "qual": "FCP", "used": "사용", "passed": "합격"}], "fcss": [{"name": "박건욱", "tasks": [{"exam": "FCSS - Network Security 7.6 Support Engineer", "used": "사용", "passed": "합격"}, {"exam": "FCSS - Enterprise Firewall 7.6 Administrator", "used": "사용", "passed": "미정"}]}, {"name": "김대중", "tasks": [{"exam": "FCSS - Network Security 7.6 Support Engineer", "used": "미사용", "passed": "미정"}, {"exam": "FCSS - Enterprise Firewall 7.6 Administrator", "used": "미사용", "passed": "미정"}]}, {"name": "임희대", "tasks": [{"exam": "FCSS - Network Security 7.6 Support Engineer", "used": "사용", "passed": "합격"}, {"exam": "FCSS - Enterprise Firewall 7.6 Administrator", "used": "사용", "passed": "합격"}]}, {"name": "김태경", "tasks": [{"exam": "FCSS - Enterprise Firewall 7.6 Administrator", "used": "사용", "passed": "불합격"}, {"exam": "FCSS - Network Security 7.6 Support Engineer", "used": "사용", "passed": "합격"}, {"exam": "FCSS - Enterprise Firewall 7.6 Administrator", "used": "미사용", "passed": "미정"}]}], "fcp": [{"name": "김기현", "tasks": [{"exam": "NSE 4 7.6 FortiOS Administrator", "used": "사용", "passed": "합격"}, {"exam": "NSE 5 7.6 FortiManager Administrator", "used": "사용", "passed": "합격"}]}]};

function badge(task) {
  if (!task) return '<span class="badge badge-none">⬜ 미배정</span>';
  const {used, passed, attempts} = task;
  const retry = attempts > 1 ? ` <span style="font-size:10px;opacity:0.7">(${attempts}회)</span>` : '';
  if (used !== '사용') return '<span class="badge badge-none">⬜ 미사용</span>';
  if (passed === '합격') return `<span class="badge badge-pass">✅ 합격</span>${retry}`;
  if (passed === '불합격') return `<span class="badge badge-fail">❌ 불합격</span>${retry}`;
  return `<span class="badge badge-wait">🔄 응시 예정</span>${retry}`;
}

function statusText(used, passed) {
  if (used !== '사용') return '미사용';
  if (passed === '합격') return '합격';
  if (passed === '불합격') return '불합격';
  return '응시 예정';
}

function isQualified(tasks) {
  const hasNST = tasks.some(t => t.exam.includes('Network Security'));
  const hasEFW = tasks.some(t => t.exam.includes('Enterprise Firewall'));
  if (hasNST || hasEFW) {
    const nstPass = tasks.some(t => t.exam.includes('Network Security') && t.passed === '합격');
    const efwPass = tasks.some(t => t.exam.includes('Enterprise Firewall') && t.passed === '합격');
    return nstPass && efwPass;
  }
  // FCP: 두 과목 모두 합격
  const used = tasks.filter(t => t.used === '사용');
  return used.length >= 2 && used.every(t => t.passed === '합격');
}

const today = new Date(DATA.generated_at);
const days = ['일','월','화','수','목','금','토'];
document.getElementById('report-date').textContent =
  `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일 (${days[today.getDay()]})`;
document.getElementById('last-updated').textContent =
  `업데이트: ${today.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'})}`;

let fcssDone = 0;
const fcssTbody = document.getElementById('fcss-tbody');
DATA.fcss.forEach(person => {
  const t1 = person.tasks[0];
  const t2 = person.tasks[1];
  const qual = isQualified(person.tasks);
  if (qual) fcssDone++;
  fcssTbody.innerHTML += `<tr>
    <td class="name-cell">${person.name}</td>
    <td>${badge(t1)}</td>
    <td>${badge(t2)}</td>
    <td>${qual ? '<span class="acq-done">🏆</span>' : '<span class="acq-no">—</span>'}</td>
  </tr>`;
});
document.getElementById('fcss-done').textContent = fcssDone;
document.getElementById('fcss-badge').textContent = `${fcssDone} / 3명`;
document.getElementById('fcss-bar').style.width = `${Math.round(fcssDone/3*100)}%`;

let fcpDone = 0;
const fcpTbody = document.getElementById('fcp-tbody');
DATA.fcp.forEach(person => {
  const t1 = person.tasks[0];
  const t2 = person.tasks[1];
  const qual = isQualified(person.tasks);
  if (qual) fcpDone++;
  fcpTbody.innerHTML += `<tr>
    <td class="name-cell">${person.name}</td>
    <td>${badge(t1)}</td>
    <td>${badge(t2)}</td>
    <td>${qual ? '<span class="acq-done">🏆</span>' : '<span class="acq-no">—</span>'}</td>
  </tr>`;
});
document.getElementById('fcp-done').textContent = fcpDone;
document.getElementById('fcp-badge').textContent = `${fcpDone} / 1명`;
document.getElementById('fcp-bar').style.width = `${Math.round(fcpDone/1*100)}%`;

renderVouchers();

function buildRows(people) {
  return people.map(person => {
    const t1 = person.tasks[0];
    const t2 = person.tasks[1];
    const qual = isQualified(person.tasks);
    return {
      '담당자': person.name,
      '자격': person.tasks[0] ? (DATA.fcss.includes(person) ? 'FCSS' : 'FCP') : '-',
      '시험1 과목명': t1 ? t1.exam : '',
      '시험1 사용여부': t1 ? t1.used : '',
      '시험1 합격여부': t1 ? statusText(t1.used, t1.passed) : '',
      '시험2 과목명': t2 ? t2.exam : '',
      '시험2 사용여부': t2 ? t2.used : '',
      '시험2 합격여부': t2 ? statusText(t2.used, t2.passed) : '',
      '자격 취득': qual ? '취득' : '미취득',
    };
  });
}

function renderVouchers() {
  document.getElementById('v-total').textContent = DATA.total_vouchers;
  document.getElementById('v-used').textContent = DATA.used_vouchers;
  document.getElementById('v-remain').textContent = DATA.remain_vouchers;
  document.getElementById('v-fail').textContent = DATA.fail_vouchers;

  // 담당자별로 묶기
  const byPerson = {};
  DATA.all_vouchers.forEach(v => {
    if (!byPerson[v.assignee]) byPerson[v.assignee] = [];
    byPerson[v.assignee].push(v);
  });

  // 최대 시험 수 계산
  const maxExams = Math.max(...Object.values(byPerson).map(t => t.length), 2);

  // 헤더 생성
  const thead = document.getElementById('voucher-thead');
  let headerHtml = '<tr><th>담당자</th><th style="text-align:center">사용 수</th>';
  for (let i = 1; i <= maxExams; i++) {
    headerHtml += `<th style="text-align:center;border-left:0.5px solid var(--border)">시험 ${i} 과목</th><th style="text-align:center">결과</th>`;
  }
  headerHtml += '</tr>';
  thead.innerHTML = headerHtml;

  // 행 생성
  const tbody = document.getElementById('voucher-tbody');
  let rowsHtml = '';
  Object.entries(byPerson).forEach(([name, tasks]) => {
    let row = `<tr><td style="font-weight:500">${name}</td><td style="text-align:center;font-family:var(--font-mono)">${tasks.length}</td>`;
    for (let i = 0; i < maxExams; i++) {
      const t = tasks[i];
      const borderStyle = 'border-left:0.5px solid var(--border)';
      if (t) {
        const examShort = t.exam.includes('Network Security') ? 'NST'
          : t.exam.includes('Enterprise Firewall') ? 'EFW'
          : t.exam.includes('FortiManager') ? 'FMG'
          : t.exam.includes('FortiOS') ? 'FOS'
          : t.exam.split(' ').slice(0,2).join(' ');
        const b = t.passed === '합격' ? '<span class="badge badge-pass">✅ 합격</span>'
          : t.passed === '불합격' ? '<span class="badge badge-fail">❌ 불합격</span>'
          : '<span class="badge badge-wait">🔄 응시 예정</span>';
        row += `<td style="text-align:center;${borderStyle}"><span style="font-size:12px;color:var(--muted)">${examShort}</span></td><td style="text-align:center">${b}</td>`;
      } else {
        row += `<td style="text-align:center;color:var(--muted);${borderStyle}">—</td><td style="text-align:center;color:var(--muted)">—</td>`;
      }
    }
    row += '</tr>';
    rowsHtml += row;
  });
  tbody.innerHTML = rowsHtml;
}

function buildRowsWithQual(people, qual) {
  return people.map(person => {
    const t1 = person.tasks[0];
    const t2 = person.tasks[1];
    const qualified = isQualified(person.tasks);
    return {
      '담당자': person.name,
      '자격': qual,
      '시험1 과목명': t1 ? t1.exam : '',
      '시험1 사용여부': t1 ? t1.used : '',
      '시험1 합격여부': t1 ? statusText(t1.used, t1.passed) : '',
      '시험1 응시횟수': t1 ? (t1.attempts || 1) : '',
      '시험2 과목명': t2 ? t2.exam : '',
      '시험2 사용여부': t2 ? t2.used : '',
      '시험2 합격여부': t2 ? statusText(t2.used, t2.passed) : '',
      '시험2 응시횟수': t2 ? (t2.attempts || 1) : '',
      '자격 취득': qualified ? '취득' : '미취득',
    };
  });
}

function downloadCSV() {
  const fcssRows = buildRowsWithQual(DATA.fcss, 'FCSS');
  const fcpRows  = buildRowsWithQual(DATA.fcp,  'FCP');
  const allRows  = [...fcssRows, ...fcpRows];
  const headers  = Object.keys(allRows[0]);
  const csvContent = [
    headers.join(','),
    ...allRows.map(row => headers.map(h => `"${(row[h]||'').toString().replace(/"/g,'""')}"`).join(','))
  ].join('\n');

  const bom = '\uFEFF';
  const blob = new Blob([bom + csvContent], {type: 'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = today.toISOString().slice(0,10);
  a.href     = url;
  a.download = `포티넷_NSE_현황_${date}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function downloadExcel() {
  const wb = XLSX.utils.book_new();

  const fcssRows = buildRowsWithQual(DATA.fcss, 'FCSS');
  const fcpRows  = buildRowsWithQual(DATA.fcp,  'FCP');
  const allRows  = [...fcssRows, ...fcpRows];

  const ws = XLSX.utils.json_to_sheet(allRows);
  ws['!cols'] = [
    {wch:10},{wch:6},{wch:36},{wch:12},{wch:12},{wch:36},{wch:12},{wch:12},{wch:8}
  ];

  XLSX.utils.book_append_sheet(wb, ws, '취득 현황');

  const date = today.toISOString().slice(0,10);
  XLSX.writeFile(wb, `포티넷_NSE_현황_${date}.xlsx`);
}
</script>
</body>
