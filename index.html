<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포티넷 NSE 자격증 취득 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f7f5;
    --card: #ffffff;
    --border: #e8e8e4;
    --text: #1a1a1a;
    --muted: #888880;
    --fcss: #1a5fb4;
    --fcss-bg: #e8f0fc;
    --fcp: #c27d0e;
    --fcp-bg: #fef3dc;
    --pass: #1d7a4a;
    --pass-bg: #e6f4ec;
    --wait: #9a6000;
    --wait-bg: #fef5e0;
    --none: #666660;
    --none-bg: #f0f0ec;
    --fail: #c0392b;
    --trophy: #d4a017;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2.5rem 1rem;
  }
  .container { max-width: 760px; margin: 0 auto; }

  .header {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1.5px solid var(--border);
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
    line-height: 1.3;
  }
  .header .date {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }
  .last-updated {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    margin-top: 4px;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 2rem;
  }
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .summary-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .summary-icon.fcss { background: var(--fcss-bg); }
  .summary-icon.fcp  { background: var(--fcp-bg); }
  .summary-info { flex: 1; }
  .summary-label { font-size: 12px; color: var(--muted); font-weight: 500; margin-bottom: 4px; }
  .summary-value { font-size: 20px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .summary-goal { font-size: 13px; color: var(--muted); }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s ease;
  }
  .progress-fill.fcss { background: var(--fcss); }
  .progress-fill.fcp  { background: var(--fcp); }

  .section { margin-bottom: 2rem; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .section-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .section-dot.fcss { background: var(--fcss); }
  .section-dot.fcp  { background: var(--fcp); }
  .section-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }
  .section-badge {
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 100px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
  }
  .section-badge.fcss { background: var(--fcss-bg); color: var(--fcss); }
  .section-badge.fcp  { background: var(--fcp-bg);  color: var(--fcp); }

  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }
  thead tr {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  th {
    padding: 10px 16px;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: left;
  }
  th:not(:first-child) { text-align: center; }
  td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  td:not(:first-child) { text-align: center; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafaf8; }

  .name-cell { font-weight: 500; font-size: 14px; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 100px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge-pass  { background: var(--pass-bg);  color: var(--pass); }
  .badge-wait  { background: var(--wait-bg);  color: var(--wait); }
  .badge-none  { background: var(--none-bg);  color: var(--none); }
  .badge-fail  { background: #fde8e6;          color: var(--fail); }

  .acq-done { font-size: 16px; }
  .acq-no   { font-size: 16px; color: #ddd; }

  .footer {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-top">
      <div>
        <h1>포티넷 NSE 자격증 취득 현황</h1>
        <div class="date" id="report-date"></div>
      </div>
      <div class="last-updated" id="last-updated"></div>
    </div>
  </div>

  <div class="summary-grid">
    <div class="summary-card">
      <div class="summary-icon fcss">🔵</div>
      <div class="summary-info">
        <div class="summary-label">FCSS 취득 현황</div>
        <div class="summary-value"><span id="fcss-done">0</span> <span class="summary-goal">/ 3명</span></div>
        <div class="progress-bar"><div class="progress-fill fcss" id="fcss-bar" style="width:0%"></div></div>
      </div>
    </div>
    <div class="summary-card">
      <div class="summary-icon fcp">🟠</div>
      <div class="summary-info">
        <div class="summary-label">FCP 취득 현황</div>
        <div class="summary-value"><span id="fcp-done">0</span> <span class="summary-goal">/ 1명</span></div>
        <div class="progress-bar"><div class="progress-fill fcp" id="fcp-bar" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-dot fcss"></div>
      <div class="section-title">FCSS 현황</div>
      <div class="section-badge fcss" id="fcss-badge">0 / 3명</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>담당자</th>
            <th>NST</th>
            <th>EFW</th>
            <th>자격 취득</th>
          </tr>
        </thead>
        <tbody id="fcss-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-dot fcp"></div>
      <div class="section-title">FCP 현황</div>
      <div class="section-badge fcp" id="fcp-badge">0 / 1명</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>담당자</th>
            <th id="fcp-col1">과목1</th>
            <th id="fcp-col2">과목2</th>
            <th>자격 취득</th>
          </tr>
        </thead>
        <tbody id="fcp-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="footer" id="footer">Fortinet NSE 바우처 관리 시스템</div>
</div>

<script>
const DATA = {"generated_at": "2026-04-15T00:25:27.755317", "fcss_done": 0, "fcp_done": 0, "fcss": [{"name": "박건욱", "tasks": [{"exam": "FCSS - Network Security 7.6 Support Engineer", "used": "사용", "passed": "합격"}, {"exam": "FCSS - Enterprise Firewall 7.6 Administrator", "used": "미사용", "passed": "미정"}]}, {"name": "김대중", "tasks": [{"exam": "FCSS - Network Security 7.6 Support Engineer", "used": "미사용", "passed": "미정"}, {"exam": "FCSS - Enterprise Firewall 7.6 Administrator", "used": "미사용", "passed": "미정"}]}, {"name": "임희대", "tasks": [{"exam": "FCSS - Network Security 7.6 Support Engineer", "used": "사용", "passed": "합격"}, {"exam": "FCSS - Enterprise Firewall 7.6 Administrator", "used": "미사용", "passed": "미정"}]}, {"name": "김태경", "tasks": [{"exam": "FCSS - Enterprise Firewall 7.6 Administrator", "used": "미사용", "passed": "미정"}, {"exam": "FCSS - Network Security 7.6 Support Engineer", "used": "사용", "passed": "미정"}]}, {"name": "이재영", "tasks": [{"exam": "FCSS - Network Security 7.6 Support Engineer", "used": "미사용", "passed": "미정"}, {"exam": "FCSS - Enterprise Firewall 7.6 Administrator", "used": "미사용", "passed": "미정"}]}], "fcp": [{"name": "김기현", "tasks": [{"exam": "NSE 4 7.6 FortiOS Administrator", "used": "사용", "passed": "미정"}, {"exam": "NSE 5 7.6 FortiManager Administrator", "used": "사용", "passed": "미정"}]}]};

function badge(used, passed) {
  if (used !== '사용') return '<span class="badge badge-none">⬜ 미사용</span>';
  if (passed === '합격') return '<span class="badge badge-pass">✅ 합격</span>';
  if (passed === '불합격') return '<span class="badge badge-fail">❌ 불합격</span>';
  return '<span class="badge badge-wait">🔄 결과대기</span>';
}

function isQualified(tasks) {
  const used = tasks.filter(t => t.used === '사용');
  return used.length >= 2 && used.every(t => t.passed === '합격');
}

const today = new Date(DATA.generated_at);
const days = ['일','월','화','수','목','금','토'];
document.getElementById('report-date').textContent =
  `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일 (${days[today.getDay()]})`;
document.getElementById('last-updated').textContent =
  `업데이트: ${today.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'})}`;

// FCSS
let fcssDone = 0;
const fcssTbody = document.getElementById('fcss-tbody');
DATA.fcss.forEach(person => {
  const nst = person.tasks.find(t => t.exam.includes('Network Security'));
  const efw = person.tasks.find(t => t.exam.includes('Enterprise Firewall'));
  const qual = isQualified(person.tasks);
  if (qual) fcssDone++;
  fcssTbody.innerHTML += `<tr>
    <td class="name-cell">${person.name}</td>
    <td>${nst ? badge(nst.used, nst.passed) : '<span class="badge badge-none">⬜ 미배정</span>'}</td>
    <td>${efw ? badge(efw.used, efw.passed) : '<span class="badge badge-none">⬜ 미배정</span>'}</td>
    <td>${qual ? '<span class="acq-done">🏆</span>' : '<span class="acq-no">—</span>'}</td>
  </tr>`;
});
document.getElementById('fcss-done').textContent = fcssDone;
document.getElementById('fcss-badge').textContent = `${fcssDone} / 3명`;
document.getElementById('fcss-bar').style.width = `${Math.round(fcssDone/3*100)}%`;

// FCP
let fcpDone = 0;
const fcpTbody = document.getElementById('fcp-tbody');
if (DATA.fcp.length > 0) {
  const firstPerson = DATA.fcp[0];
  const exams = [...new Set(firstPerson.tasks.map(t => {
    if (t.exam.includes('FortiManager')) return 'FMG';
    if (t.exam.includes('FortiOS')) return 'FOS';
    return t.exam.split(' ')[0];
  }))];
  document.getElementById('fcp-col1').textContent = exams[0] || '과목1';
  document.getElementById('fcp-col2').textContent = exams[1] || '과목2';
}
DATA.fcp.forEach(person => {
  const t1 = person.tasks[0];
  const t2 = person.tasks[1];
  const qual = isQualified(person.tasks);
  if (qual) fcpDone++;
  fcpTbody.innerHTML += `<tr>
    <td class="name-cell">${person.name}</td>
    <td>${t1 ? badge(t1.used, t1.passed) : '<span class="badge badge-none">⬜ 미배정</span>'}</td>
    <td>${t2 ? badge(t2.used, t2.passed) : '<span class="badge badge-none">⬜ 미배정</span>'}</td>
    <td>${qual ? '<span class="acq-done">🏆</span>' : '<span class="acq-no">—</span>'}</td>
  </tr>`;
});
document.getElementById('fcp-done').textContent = fcpDone;
document.getElementById('fcp-badge').textContent = `${fcpDone} / 1명`;
document.getElementById('fcp-bar').style.width = `${Math.round(fcpDone/1*100)}%`;
</script>
</body>
</html>
